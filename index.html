<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furnishing Quito</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0EB;--bg-card:#FFF;--bg-hover:#FAF6F1;--text:#2C2420;--text-sec:#8A7D74;--text-mut:#B5AAA0;
  --accent:#C4613A;--accent-lt:#E8845E;--accent-bg:#FDF0EA;--border:#E5DDD5;--border-s:#D4C9BE;
  --tag-bg:#EDE7E0;--tag-text:#6B5E54;--sel-border:#C4613A;--sel-bg:#FFF9F4;
  --shadow:0 1px 4px rgba(44,36,32,.03),0 4px 16px rgba(44,36,32,.04);
  --r:12px;--rs:8px;--t:.25s cubic-bezier(.4,0,.2,1);
  --f-d:'DM Serif Display',Georgia,serif;--f-b:'Outfit',-apple-system,sans-serif;--f-m:'JetBrains Mono',monospace;
  --deal-bg:#E8F5E9;--deal-text:#2E7D32;--over-bg:#FFF3E0;--over-text:#E65100;
  --bar:#C4613A;--bar-bg:#EDE7E0;
}
[data-theme="dark"]{
  --bg:#1A1614;--bg-card:#252120;--bg-hover:#2E2926;--text:#F0E8E0;--text-sec:#9E928A;--text-mut:#6B5F57;
  --accent:#E8845E;--accent-lt:#F0A080;--accent-bg:#3A2820;--border:#3A3430;--border-s:#4A433E;
  --tag-bg:#3A3430;--tag-text:#B5A89E;--sel-border:#E8845E;--sel-bg:#2E2521;
  --shadow:0 1px 4px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.2);
  --deal-bg:#1B3A1E;--deal-text:#81C784;--over-bg:#3A2510;--over-text:#FFB74D;
  --bar:#E8845E;--bar-bg:#3A3430;
}
html{scroll-behavior:smooth}
body{font-family:var(--f-b);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}

/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 2rem}
.header{padding-top:2.5rem}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.header-title{font-family:var(--f-d);font-size:clamp(2rem,5vw,3rem);font-weight:400;line-height:1.1}
.header-title em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.9rem;color:var(--text-sec);margin-top:.3rem}
.controls{display:flex;gap:.5rem;align-items:center}
.btn-sm{background:var(--bg-card);border:1px solid var(--border);border-radius:50px;padding:.45rem .85rem;cursor:pointer;font-size:.82rem;font-family:var(--f-b);color:var(--text-sec);transition:all var(--t);display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn-sm:hover{border-color:var(--border-s);color:var(--text)}
.btn-sm.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Budget */
.budget{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.5rem;box-shadow:var(--shadow);margin-bottom:1rem;transition:all var(--t)}
.budget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.7rem}
.budget-lbl{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-sec)}
.budget-amt{font-family:var(--f-m);font-size:1.3rem;font-weight:500}
.budget-amt span{color:var(--text-mut);font-weight:400;font-size:.9rem}
.bar-track{width:100%;height:6px;background:var(--bar-bg);border-radius:50px;overflow:hidden}
.bar-fill{height:100%;background:var(--bar);border-radius:50px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.budget-det{display:flex;gap:1.2rem;margin-top:.6rem;flex-wrap:wrap;font-size:.78rem;color:var(--text-mut)}
.budget-det strong{color:var(--text-sec);font-weight:600}

/* Tabs */
.tabs{position:sticky;top:0;z-index:100;background:var(--bg);padding:.7rem 0;transition:background var(--t)}
.tabs-row{display:flex;gap:.35rem;overflow-x:auto;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{font-family:var(--f-b);font-size:.85rem;font-weight:500;padding:.5rem 1.1rem;border:1px solid transparent;border-radius:50px;background:transparent;color:var(--text-sec);cursor:pointer;white-space:nowrap;transition:all var(--t)}
.tab:hover{color:var(--text);background:var(--bg-hover)}
.tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.tab .ct{display:inline-flex;align-items:center;justify-content:center;min-width:1.2rem;height:1.2rem;font-size:.68rem;font-weight:600;border-radius:50px;margin-left:.3rem;padding:0 .3rem;background:var(--tag-bg);color:var(--tag-text);transition:all var(--t)}
.tab.on .ct{background:rgba(255,255,255,.2);color:var(--bg)}

/* Content */
.content{padding:1rem 0 4rem;min-height:40vh}
.view-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.subcat-heading{font-family:var(--f-d);font-size:1.15rem;color:var(--text);margin:1.5rem 0 .7rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.subcat-heading:first-child{margin-top:0}

/* ═══ LIST VIEW ═══ */
.list-item{display:flex;align-items:center;gap:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow);transition:all var(--t);cursor:default}
.list-item:hover{border-color:var(--border-s);box-shadow:0 4px 16px rgba(44,36,32,.06)}
.list-item.sel{border-color:var(--sel-border);background:var(--sel-bg);box-shadow:0 4px 16px rgba(44,36,32,.06),0 0 0 1px var(--sel-border)}
.list-thumb{width:70px;height:70px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:var(--bg-hover);display:flex;align-items:center;justify-content:center}
.list-thumb img{max-width:64px;max-height:64px;object-fit:contain}
.list-info{flex:1;min-width:0}
.list-brand{font-family:var(--f-d);font-size:1.05rem;line-height:1.2}
.list-type{font-size:.75rem;color:var(--text-sec)}
.list-specs{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.25rem}
.list-specs .tag{font-size:.68rem;font-weight:500;padding:.15rem .5rem;background:var(--tag-bg);color:var(--tag-text);border-radius:50px}
.list-item.sel .tag{background:var(--accent-bg);color:var(--accent)}
.list-verdict{font-size:.75rem;color:var(--text-sec);font-style:italic;margin-top:.3rem;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.list-price-col{text-align:right;flex-shrink:0;min-width:110px}
.list-price{font-family:var(--f-m);font-size:1.2rem;font-weight:500}
.list-msrp{font-size:.7rem;color:var(--text-mut)}
.list-msrp s{margin-right:.3rem}
.list-discount{font-size:.66rem;font-weight:600;color:var(--deal-text);background:var(--deal-bg);padding:.1rem .35rem;border-radius:4px}
.list-color{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--tag-text);background:var(--tag-bg);padding:.12rem .45rem;border-radius:50px;margin-top:.15rem;display:inline-block}
.list-stores{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.list-stores a{font-size:.7rem;color:var(--accent);text-decoration:none;padding:.15rem .45rem;border:1px solid var(--border);border-radius:4px;transition:all var(--t)}
.list-stores a:hover{background:var(--accent-bg);border-color:var(--accent)}
.list-stores a.best{border-color:var(--deal-text);background:var(--deal-bg);color:var(--deal-text);font-weight:600}
.list-sel{width:1.8rem;height:1.8rem;border-radius:50%;border:2px solid var(--border-s);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);color:transparent;flex-shrink:0}
.list-sel:hover{border-color:var(--accent);background:var(--accent-bg)}
.list-item.sel .list-sel{border-color:var(--accent);background:var(--accent);color:white}

/* ═══ CARD VIEW ═══ */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:all var(--t);display:flex;flex-direction:column}
.card:hover{box-shadow:0 4px 16px rgba(44,36,32,.06);border-color:var(--border-s)}
.card.sel{border-color:var(--sel-border);background:var(--sel-bg);box-shadow:0 4px 16px rgba(44,36,32,.06),0 0 0 1px var(--sel-border)}
.card-img{width:100%;height:200px;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{max-height:180px;max-width:90%;object-fit:contain;transition:transform .3s ease}
.card-img:hover img{transform:scale(1.05)}
.card-badge{position:absolute;top:.5rem;font-size:.65rem;font-weight:600;padding:.15rem .5rem;border-radius:50px}
.card-badge.left{left:.5rem;background:var(--tag-bg);color:var(--tag-text)}
.card-badge.right{right:.5rem}
.card-body{padding:1rem 1.2rem 1.2rem;display:flex;flex-direction:column;flex:1}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.card-sub{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.2rem}
.card-brand{font-family:var(--f-d);font-size:1.25rem;line-height:1.2}
.card-model{font-size:.82rem;color:var(--text-sec);margin-top:.1rem}
.card-verdict{font-size:.78rem;color:var(--text-sec);font-style:italic;margin:.5rem 0;padding:.5rem .7rem;background:var(--bg-hover);border-radius:var(--rs);border-left:3px solid var(--accent);line-height:1.4}
.card-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin:.4rem 0}
.card-tags .tag{font-size:.72rem;font-weight:500;padding:.2rem .55rem;background:var(--tag-bg);color:var(--tag-text);border-radius:50px;transition:all var(--t)}
.card.sel .tag{background:var(--accent-bg);color:var(--accent)}
.card-bottom{margin-top:auto;padding-top:.8rem;border-top:1px solid var(--border)}
.card-price-row{display:flex;justify-content:space-between;align-items:baseline}
.card-price{font-family:var(--f-m);font-size:1.4rem;font-weight:500}
.card-msrp{font-size:.72rem;color:var(--text-mut);margin-top:.1rem}
.card-msrp s{margin-right:.3rem}
.card-stores{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.card-stores a{font-size:.72rem;color:var(--accent);text-decoration:none;padding:.2rem .55rem;border:1px solid var(--border);border-radius:4px;transition:all var(--t)}
.card-stores a:hover{background:var(--accent-bg);border-color:var(--accent)}
.card-stores a.best{border-color:var(--deal-text);background:var(--deal-bg);color:var(--deal-text);font-weight:600}
.card-notes{margin-top:.6rem;padding-top:.6rem;border-top:1px dashed var(--border)}
.card-notes textarea{width:100%;font-family:var(--f-b);font-size:.78rem;color:var(--text-sec);background:transparent;border:none;resize:vertical;min-height:2rem;line-height:1.5;outline:none}

/* Empty / Lock / Print / Responsive */
.empty{text-align:center;padding:3rem 2rem}.empty-icon{width:56px;height:56px;margin:0 auto .8rem;border-radius:50%;background:var(--tag-bg);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--border-s)}.empty-title{font-family:var(--f-d);font-size:1.2rem;margin-bottom:.3rem}.empty-text{font-size:.85rem;color:var(--text-mut);max-width:320px;margin:0 auto}
.lock{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s ease,visibility .4s ease}.lock.hide{opacity:0;visibility:hidden;pointer-events:none}.lock-box{text-align:center;max-width:340px;padding:2rem}.lock h1{font-family:var(--f-d);font-size:2.2rem;margin-bottom:.2rem}.lock h1 em{font-style:italic;color:var(--accent)}.lock p{font-size:.85rem;color:var(--text-mut);margin-bottom:1.5rem}.lock form{display:flex;gap:.4rem}.lock input{flex:1;font-family:var(--f-b);font-size:.9rem;padding:.6rem .9rem;border:1px solid var(--border-s);border-radius:var(--rs);background:var(--bg-card);color:var(--text);outline:none;transition:border-color var(--t)}.lock input:focus{border-color:var(--accent)}.lock input.err{border-color:#c0392b;animation:shake .4s ease}.lock button{font-family:var(--f-b);font-size:.85rem;font-weight:600;padding:.6rem 1.2rem;border:none;border-radius:var(--rs);background:var(--accent);color:white;cursor:pointer;transition:background var(--t)}.lock button:hover{background:var(--accent-lt)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media print{.lock,.tabs,.controls{display:none!important}.list-item,.card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}body{background:white}}
@media(max-width:720px){.wrap{padding:0 1rem}.card-grid{grid-template-columns:1fr}.header-title{font-size:1.8rem}.list-verdict{display:none}.list-specs{display:none}.list-thumb{width:50px;height:50px}.list-thumb img{max-width:44px;max-height:44px}}
</style>
</head>

<!-- Lock -->
<div class="lock" id="lock">
  <div class="lock-box"><h1>Furnishing <em>Quito</em></h1><p>Protected access</p>
    <form onsubmit="return doUnlock(event)"><input id="lockPw" type="password" placeholder="Password" autocomplete="off" autofocus><button type="submit">Enter</button></form>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
<div class="wrap header">
  <div class="header-top">
    <div><h1 class="header-title">Furnishing <em>Quito</em></h1><p class="header-sub">Apartment shopping tracker</p></div>
    <div class="controls">
      <button class="btn-sm" id="viewBtn" onclick="toggleView()"><span id="viewIcon">&#9776;</span> <span id="viewLbl">List</span></button>
      <button class="btn-sm" onclick="toggleTheme()"><span id="themeIcon">&#9790;</span> <span id="themeLbl">Dark</span></button>
    </div>
  </div>
  <div class="budget" id="budget">
    <div class="budget-top"><span class="budget-lbl">Selected items</span><span class="budget-amt" id="budgetAmt">$0</span></div>
    <div class="bar-track"><div class="bar-fill" id="budgetBar"></div></div>
    <div class="budget-det" id="budgetDet"></div>
  </div>
</div>
<div class="wrap tabs"><div class="tabs-row" id="tabs"></div></div>
<div class="wrap content" id="content"></div>
</div>

<script>
// Auth
const H='d0611ff42c36f3a73082720e7160ac8d901c72e5396dcdf5b8428e79f07c8268';
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function unlock(){document.getElementById('lock').classList.add('hide');document.getElementById('app').style.display='';localStorage.setItem('quito-auth','ok')}
async function doUnlock(e){e.preventDefault();const i=document.getElementById('lockPw');if(await sha256(i.value)===H)unlock();else{i.classList.add('err');i.value='';setTimeout(()=>i.classList.remove('err'),500)}return false}
if(localStorage.getItem('quito-auth')==='ok')unlock();
</script>

<script>
let tab='kitchen', view=localStorage.getItem('quito-view')||'list';

// Theme
function setTheme(d){document.documentElement.setAttribute('data-theme',d?'dark':'light');document.getElementById('themeIcon').innerHTML=d?'&#9788;':'&#9790;';document.getElementById('themeLbl').textContent=d?'Light':'Dark';localStorage.setItem('quito-theme',d?'dark':'light')}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')!=='dark')}
{const t=localStorage.getItem('quito-theme');if(t==='dark')setTheme(true);else if(t==='light')setTheme(false);else if(matchMedia('(prefers-color-scheme:dark)').matches)setTheme(true)}

// View toggle
function toggleView(){view=view==='list'?'cards':'list';localStorage.setItem('quito-view',view);updateViewBtn();render()}
function updateViewBtn(){document.getElementById('viewIcon').innerHTML=view==='list'?'&#9776;':'&#9638;';document.getElementById('viewLbl').textContent=view==='list'?'List':'Cards'}
updateViewBtn();

// Helpers
function bestPrice(p){const prices=p.stores.filter(s=>s.price).map(s=>s.price);return prices.length?Math.min(...prices):null}
function bestStore(p){const bp=bestPrice(p);return p.stores.find(s=>s.price===bp)||p.stores[0]}
function discount(p){const bp=bestPrice(p);return bp&&p.msrp?Math.round((1-bp/p.msrp)*100):0}

// Tabs
function renderTabs(){document.getElementById('tabs').innerHTML=CATEGORIES.map(c=>{const n=PRODUCTS.filter(p=>p.category===c.id).length;return`<button class="tab${tab===c.id?' on':''}" onclick="switchTab('${c.id}')">${c.label}${n?`<span class="ct">${n}</span>`:''}</button>`}).join('')}
function switchTab(id){tab=id;renderTabs();render()}

// Budget
function updateBudget(){const sel=PRODUCTS.filter(p=>p.selected);const tot=sel.reduce((s,p)=>s+(bestPrice(p)||0),0);const n=sel.length;document.getElementById('budgetAmt').innerHTML=`<span>$ </span>${tot.toLocaleString('en-US')}`;document.getElementById('budgetBar').style.width=Math.min(tot/Math.max(tot*1.3,5000)*100,100)+'%';const cats={};sel.forEach(p=>{const c=CATEGORIES.find(x=>x.id===p.category);if(!cats[p.category])cats[p.category]={l:c?c.label:p.category,t:0};cats[p.category].t+=(bestPrice(p)||0)});document.getElementById('budgetDet').innerHTML=`<span><strong>${n}</strong> item${n!==1?'s':''}</span>`+Object.values(cats).map(c=>`<span>${c.l}: <strong>$${c.t.toLocaleString('en-US')}</strong></span>`).join('')}

// Render
function render(){
  const el=document.getElementById('content');
  const items=PRODUCTS.filter(p=>p.category===tab);
  if(!items.length){const c=CATEGORIES.find(x=>x.id===tab);const h={kitchen:'Cooktop, air fryer, microwave...',office:'Desks, ergonomic chairs, monitors...',bedroom:'Bed, mattress, nightstands...',living:'Sofa, coffee table, shelves...',laundry:'Washing machine, drying rack...'};el.innerHTML=`<div class="empty"><div class="empty-icon">+</div><div class="empty-title">Nothing yet in ${c?c.label:''}</div><p class="empty-text">${h[tab]||''}</p></div>`;return}
  // Group by subcategory
  const groups={};items.forEach(p=>{(groups[p.subcategory]=groups[p.subcategory]||[]).push(p)});
  let html='';
  for(const[sub,prods]of Object.entries(groups)){
    html+=`<div class="subcat-heading">${sub}</div>`;
    if(view==='list'){html+=prods.map(listHTML).join('')}
    else{html+=`<div class="card-grid">${prods.map(cardHTML).join('')}</div>`}
  }
  el.innerHTML=`<div style="animation:fadeUp .3s ease">${html}</div>`;
}

const chk=`<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5L6 10.5L11 4"/></svg>`;
const arrow=`<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 11L11 1M11 1H5M11 1V7"/></svg>`;

function storeLinks(p){
  const bp=bestPrice(p);
  return p.stores.map(s=>`<a href="${s.link}" target="_blank" rel="noopener" class="${s.price===bp?'best':''}">${s.name}${s.price?' $'+s.price.toLocaleString('en-US'):''} ${arrow}</a>`).join('')
}

function listHTML(p){
  const bp=bestPrice(p);const d=discount(p);
  return`<div class="list-item${p.selected?' sel':''}" data-id="${p.id}">
    <div class="list-thumb">${p.image?`<img src="${p.image}" alt="${p.brand}" loading="lazy" onerror="this.style.display='none'">`:''}</div>
    <div class="list-info">
      <div class="list-brand">${p.brand} <span style="font-family:var(--f-b);font-size:.82rem;color:var(--text-sec);font-weight:400">${p.model}</span></div>
      <div class="list-type">${p.type} <span class="list-color">${p.color}</span></div>
      <div class="list-specs">${p.specs.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
      ${p.verdict?`<div class="list-verdict">${p.verdict}</div>`:''}
      <div class="list-stores">${storeLinks(p)}</div>
    </div>
    <div class="list-price-col">
      <div class="list-price">$${bp?bp.toLocaleString('en-US'):'TBD'}</div>
      ${p.msrp&&bp?`<div class="list-msrp"><s>$${p.msrp.toLocaleString('en-US')}</s><span class="list-discount">-${d}%</span></div>`:''}
    </div>
    <button class="list-sel" onclick="toggleSel('${p.id}')" title="${p.selected?'Remove':'Select'}">${chk}</button>
  </div>`
}

function cardHTML(p){
  const bp=bestPrice(p);const d=discount(p);const over=bp&&bp>MAX_BUDGET;
  return`<div class="card${p.selected?' sel':''}" data-id="${p.id}">
    <div class="card-img">
      ${p.image?`<img src="${p.image}" alt="${p.brand}" loading="lazy" onerror="this.style.display='none'">`:''}
      <span class="card-badge left">${p.color}</span>
      ${d>=20?`<span class="card-badge right" style="background:var(--deal-bg);color:var(--deal-text)">-${d}%</span>`:''}
      ${over?`<span class="card-badge right" style="background:var(--over-bg);color:var(--over-text);${d>=20?'top:2.2rem':''}">Over budget</span>`:''}
    </div>
    <div class="card-body">
      <div class="card-head"><div>
        <div class="card-sub">${p.subcategory} &middot; ${p.type}</div>
        <div class="card-brand">${p.brand}</div>
        <div class="card-model">${p.model}</div>
      </div><button class="list-sel" onclick="toggleSel('${p.id}')">${chk}</button></div>
      ${p.verdict?`<div class="card-verdict">${p.verdict}</div>`:''}
      <div class="card-tags">${p.specs.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
      <div class="card-bottom">
        <div class="card-price-row"><div>
          <div class="card-price">$${bp?bp.toLocaleString('en-US'):'TBD'}</div>
          ${p.msrp&&bp?`<div class="card-msrp"><s>$${p.msrp.toLocaleString('en-US')}</s> <span class="list-discount">-${d}%</span></div>`:''}
        </div></div>
        <div class="card-stores">${storeLinks(p)}</div>
      </div>
      <div class="card-notes"><textarea placeholder="Notes..." oninput="updateNotes('${p.id}',this.value)">${p.notes||''}</textarea></div>
    </div>
  </div>`
}

function toggleSel(id){const p=PRODUCTS.find(x=>x.id===id);if(p){p.selected=!p.selected;render();updateBudget();saveState()}}
function updateNotes(id,v){const p=PRODUCTS.find(x=>x.id===id);if(p){p.notes=v;saveState()}}
function saveState(){localStorage.setItem('quito-products',JSON.stringify(PRODUCTS.map(p=>({id:p.id,selected:p.selected,notes:p.notes}))))}
function loadState(){try{(JSON.parse(localStorage.getItem('quito-products')||'[]')).forEach(s=>{const p=PRODUCTS.find(x=>x.id===s.id);if(p){p.selected=s.selected;if(s.notes!==undefined)p.notes=s.notes}})}catch(e){}}

loadState();renderTabs();render();updateBudget();
</script>
</body>
</html>
